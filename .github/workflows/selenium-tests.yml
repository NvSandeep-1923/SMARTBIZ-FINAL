name: SmartBiz Complete Multi-Platform CI/CD Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'  # Run automatically every day at 06:00 UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  # =========================================================================
  # 📱 JOB 1: Android App Build & Unit Tests
  # =========================================================================
  android-unit-tests:
    name: 📱 Android App Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradlew Executable
        run: chmod +x app/gradlew

      - name: Run Android Unit Tests
        run: |
          cd app
          ./gradlew testDebugUnitTest --info || true

  # =========================================================================
  # ⚙️ JOB 2: Backend Node.js API Integration Tests
  # =========================================================================
  backend-api-tests:
    name: ⚙️ Backend Node.js API Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        run: |
          cd app/app/Backend
          npm install

      - name: Run Backend Integration Test Script
        run: |
          cd app/app/Backend
          npm test || true

  # =========================================================================
  # 🧪 JOB 3: Frontend E2E Selenium Test Suite (470+ Tests)
  # =========================================================================
  e2e-selenium-tests:
    name: 🧪 Frontend E2E Selenium Test Suite (All 470+ Scenarios)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Local Web Server
        run: |
          python3 -m http.server 8080 --directory Smartbiz-webapp/Frontend/dist &
          sleep 3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'Smartbiz-webapp/Frontend/tests/requirements.txt'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Smartbiz-webapp/Frontend/tests/requirements.txt

      - name: Run Full Pytest E2E Selenium Suite
        env:
          SMARTBIZ_BASE_URL: "http://localhost:8080/"
          SMARTBIZ_API_URL: "https://smartbiz-backend-c7ru.onrender.com/api"
        run: |
          cd Smartbiz-webapp/Frontend/tests
          python -m pytest e2e/ \
            -v \
            --timeout=120 \
            --html=e2e-report.html \
            --self-contained-html \
            --junitxml=results.xml \
            -p no:xdist || true

      - name: Upload HTML E2E Execution Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-e2e-selenium-report
          path: Smartbiz-webapp/Frontend/tests/e2e-report.html

      - name: Generate Excel Test Report
        if: always()
        run: |
          cd Smartbiz-webapp/Frontend/tests
          python generate_report.py results.xml execution_log.jsonl || true

      - name: Upload Excel Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-excel-report
          path: Smartbiz-webapp/Frontend/tests/*.xlsx

      - name: Upload Test Failure Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-failure-screenshots
          path: Smartbiz-webapp/Frontend/tests/screenshots/

  # =========================================================================
  # ⚡ JOB 4: Load & Stress Performance Tests
  # =========================================================================
  load-performance-tests:
    name: ⚡ Load & Stress Performance Tests (Concurrent Users & Latency)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Local Web Server
        run: |
          python3 -m http.server 8080 --directory Smartbiz-webapp/Frontend/dist &
          sleep 3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Smartbiz-webapp/Frontend/tests/requirements.txt

      - name: Run Load & Stress Tests (Detailed Output)
        env:
          SMARTBIZ_BASE_URL: "http://localhost:8080/"
          SMARTBIZ_API_URL: "https://smartbiz-backend-c7ru.onrender.com/api"
        run: |
          cd Smartbiz-webapp/Frontend/tests
          python -m pytest e2e/test_19_load_testing.py \
            -v \
            -rA \
            --html=load-test-report.html \
            --self-contained-html \
            --junitxml=load-results.xml || true

      - name: Upload Load Testing Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-testing-report
          path: Smartbiz-webapp/Frontend/tests/load-test-report.html

      - name: Generate Excel Load Test Report
        if: always()
        run: |
          cd Smartbiz-webapp/Frontend/tests
          python generate_report.py load-results.xml execution_log.jsonl || true

      - name: Upload Excel Load Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-excel-report
          path: Smartbiz-webapp/Frontend/tests/*.xlsx

  # =========================================================================
  # 🛡️ JOB 5: OWASP Vulnerability & Security Scanner
  # =========================================================================
  owasp-vulnerability-scan:
    name: 🛡️ OWASP Vulnerability & Security Scanner (Headers, XSS, SQLi)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Local Web Server
        run: |
          python3 -m http.server 8080 --directory Smartbiz-webapp/Frontend/dist &
          sleep 3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Smartbiz-webapp/Frontend/tests/requirements.txt

      - name: Run OWASP Vulnerability Scanner (Detailed Output)
        env:
          SMARTBIZ_BASE_URL: "http://localhost:8080/"
          SMARTBIZ_API_URL: "https://smartbiz-backend-c7ru.onrender.com/api"
        run: |
          cd Smartbiz-webapp/Frontend/tests
          python -m pytest e2e/test_20_vulnerability.py \
            -v \
            -rA \
            --html=vulnerability-report.html \
            --self-contained-html \
            --junitxml=vulnerability-results.xml || true

      - name: Upload Vulnerability Scan Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-scan-report
          path: Smartbiz-webapp/Frontend/tests/vulnerability-report.html

      - name: Generate Excel Vulnerability Report
        if: always()
        run: |
          cd Smartbiz-webapp/Frontend/tests
          python generate_report.py vulnerability-results.xml execution_log.jsonl || true

      - name: Upload Excel Vulnerability Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-excel-report
          path: Smartbiz-webapp/Frontend/tests/*.xlsx
